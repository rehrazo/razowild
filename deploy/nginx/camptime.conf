# Domain-specific example for razowild.com.
# Copy to /etc/nginx/sites-available/razowild.conf and symlink into sites-enabled.

server {
  listen 80;
  server_name razowild.com www.razowild.com admin.razowild.com api.razowild.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name razowild.com;

  ssl_certificate /etc/letsencrypt/live/razowild.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/razowild.com/privkey.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  return 301 https://www.razowild.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.razowild.com;

  ssl_certificate /etc/letsencrypt/live/razowild.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/razowild.com/privkey.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  client_max_body_size 20m;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.razowild.com;

  ssl_certificate /etc/letsencrypt/live/admin.razowild.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.razowild.com/privkey.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  client_max_body_size 20m;

  location = / {
    return 302 /admin;
  }

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Optional hardening for admin portal.
  # allow 203.0.113.10;
  # deny all;
}

server {
  listen 443 ssl http2;
  server_name api.razowild.com;

  ssl_certificate /etc/letsencrypt/live/api.razowild.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.razowild.com/privkey.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  client_max_body_size 20m;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
